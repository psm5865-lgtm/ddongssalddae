<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:636px;height:1048px;overflow:hidden}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif}
  .wrap{width:636px;height:1048px;background:linear-gradient(160deg,#E8F1FF,#F7FAFF);display:flex;flex-direction:column}
  .cap{padding:60px 52px 18px}
  .cap h2{font-size:46px;font-weight:800;color:#191F28;letter-spacing:-1.5px;line-height:1.25}
  .cap p{font-size:24px;color:#4E5968;margin-top:14px;font-weight:500}
  .screen{flex:1;margin:14px 44px 50px;background:#fff;border-radius:44px;box-shadow:0 30px 70px rgba(30,60,120,.16);
    padding:40px 34px;display:flex;flex-direction:column;gap:22px;color:#191F28}
  .hbrand{font-size:26px;font-weight:800;color:#3182F6}
  .greet{font-size:33px;font-weight:800;letter-spacing:-1px;margin-top:-6px}
  .hero{background:linear-gradient(150deg,#3B8DFB,#2E73E6);border-radius:28px;padding:34px 30px;color:#fff}
  .hero .hl{font-size:21px;font-weight:600;opacity:.92}
  .hero .hb{font-size:37px;font-weight:800;line-height:1.3;margin-top:14px;letter-spacing:-1px}
  .stamps{background:#fff;border:1px solid #F2F4F6;border-radius:24px;box-shadow:0 6px 20px rgba(0,0,0,.05);padding:26px 24px}
  .stt{display:flex;justify-content:space-between;align-items:baseline;font-size:23px;font-weight:700}
  .stt .c{font-size:19px;color:#8B95A1;font-weight:600}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:22px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .d{font-size:17px;color:#8B95A1;font-weight:600}.d.today{color:#3182F6;font-weight:800}
  .st{width:42px;height:42px;border-radius:50%;background:#F2F4F6;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;color:transparent}
  .st.on{background:#3182F6;color:#fff}.st.tod{outline:3px solid #3182F6;outline-offset:2px}
  .spacer{flex:1}
  .btn{height:84px;border-radius:22px;background:#3182F6;color:#fff;font-size:27px;font-weight:700;display:flex;align-items:center;justify-content:center}
</style></head>
<body>
  <div class="wrap">
    <div class="cap"><h2>변기 위 5분,<br>알고리즘한테 안 뺏기기</h2><p>앉은 김에, 마음도 비우고 가요.</p></div>
    <div class="screen">
      <div class="hbrand">똥쌀때</div>
      <div class="greet">안녕하세요, 샘님</div>
      <div class="hero"><div class="hl">지금 화장실 안인가요?</div><div class="hb">앉으셨다면<br>5분만 함께해요.</div></div>
      <div class="stamps">
        <div class="stt"><span>이번 주 마음챙김</span><span class="c">4/7</span></div>
        <div class="week">
          <div class="cell"><span class="d">월</span><div class="st on">✓</div></div>
          <div class="cell"><span class="d">화</span><div class="st on">✓</div></div>
          <div class="cell"><span class="d">수</span><div class="st">✓</div></div>
          <div class="cell"><span class="d">목</span><div class="st on">✓</div></div>
          <div class="cell"><span class="d today">금</span><div class="st on tod">✓</div></div>
          <div class="cell"><span class="d">토</span><div class="st">✓</div></div>
          <div class="cell"><span class="d">일</span><div class="st">✓</div></div>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="btn">앉으셨나요? 시작하기</div>
    </div>
  </div>
</body></html>
