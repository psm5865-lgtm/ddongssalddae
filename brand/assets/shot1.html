<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:636px;height:1048px;overflow:hidden}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif}
  .wrap{width:636px;height:1048px;background:linear-gradient(160deg,#E8F1FF,#F7FAFF);display:flex;flex-direction:column}
  .cap{padding:62px 52px 22px}
  .cap h2{font-size:47px;font-weight:800;color:#191F28;letter-spacing:-1.5px;line-height:1.25}
  .cap p{font-size:25px;color:#4E5968;margin-top:16px;font-weight:500}
  .screen{flex:1;margin:16px 44px 54px;background:#fff;border-radius:44px;box-shadow:0 30px 70px rgba(30,60,120,.16);
    padding:46px 40px;display:flex;flex-direction:column;color:#191F28}
  .top{display:flex;justify-content:space-between;align-items:flex-start}
  .lbl{font-size:23px;font-weight:700;color:#3182F6;padding-top:10px}
  .ring{width:96px;height:96px;border-radius:50%;border:6px solid #E8F3FF;border-top-color:#3182F6;transform:rotate(30deg);
    display:flex;align-items:center;justify-content:center}
  .ring span{transform:rotate(-30deg);font-size:23px;font-weight:700}
  .qm{font-size:84px;color:#C9E2FF;text-align:center;line-height:.4;margin-top:30px}
  .q{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;font-size:43px;font-weight:700;line-height:1.5;letter-spacing:-1px}
  .btn{height:86px;border-radius:22px;background:#3182F6;color:#fff;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center}
</style></head>
<body>
  <div class="wrap">
    <div class="cap"><h2>숏츠 대신,<br>오늘의 문장 한 줄</h2><p>스크롤은 멈추고, 마음만 남아요.</p></div>
    <div class="screen">
      <div class="top"><span class="lbl">오늘의 문장</span><div class="ring"><span>4:38</span></div></div>
      <div class="qm">"</div>
      <div class="q">지금 이 순간,<br>내 호흡은<br>어디에 있나요?</div>
      <div class="btn">마음에 새겼어요</div>
    </div>
  </div>
</body></html>
