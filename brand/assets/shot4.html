<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:636px;height:1048px;overflow:hidden}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif}
  .wrap{width:636px;height:1048px;background:linear-gradient(160deg,#E8F1FF,#F7FAFF);display:flex;flex-direction:column}
  .cap{padding:62px 52px 22px}
  .cap h2{font-size:47px;font-weight:800;color:#191F28;letter-spacing:-1.5px;line-height:1.25}
  .cap p{font-size:25px;color:#4E5968;margin-top:16px;font-weight:500}
  .screen{flex:1;margin:16px 44px 54px;background:#fff;border-radius:44px;box-shadow:0 30px 70px rgba(30,60,120,.16);
    padding:46px 40px;display:flex;flex-direction:column;color:#191F28}
  .lbl{font-size:23px;font-weight:700;color:#3182F6}
  .prompt{font-size:38px;font-weight:800;line-height:1.4;letter-spacing:-1px;margin-top:38px}
  .field{margin-top:34px;background:#F9FAFB;border:1px solid #E5E8EB;border-radius:20px;padding:28px 26px;font-size:28px;color:#191F28;min-height:160px}
  .counter{margin-top:14px;text-align:right;font-size:20px;color:#B0B8C1}
  .spacer{flex:1}
  .btn{height:86px;border-radius:22px;background:#3182F6;color:#fff;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center}
</style></head>
<body>
  <div class="wrap">
    <div class="cap"><h2>감사도 다짐도,<br>한 줄이면 충분해요</h2><p>쓰고 나면 도장 하나 — 그게 전부예요.</p></div>
    <div class="screen">
      <div class="lbl">오늘의 한 줄</div>
      <div class="prompt">오늘 작게라도<br>감사한 일 한 가지는?</div>
      <div class="field">엄마가 끓여준 미역국 한 그릇</div>
      <div class="counter">14 / 140</div>
      <div class="spacer"></div>
      <div class="btn">저장하고 끝내기</div>
    </div>
  </div>
</body></html>
