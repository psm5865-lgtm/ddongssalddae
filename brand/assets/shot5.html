<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:636px;height:1048px;overflow:hidden}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif}
  .wrap{width:636px;height:1048px;background:linear-gradient(160deg,#E8F1FF,#F7FAFF);display:flex;flex-direction:column}
  .cap{padding:62px 52px 22px}
  .cap h2{font-size:47px;font-weight:800;color:#191F28;letter-spacing:-1.5px;line-height:1.25}
  .cap p{font-size:25px;color:#4E5968;margin-top:16px;font-weight:500}
  .screen{flex:1;margin:16px 44px 54px;background:#F9FAFB;border-radius:44px;box-shadow:0 30px 70px rgba(30,60,120,.16);
    padding:42px 32px;display:flex;flex-direction:column;gap:18px;color:#191F28}
  .jtop{font-size:30px;font-weight:800;text-align:center;margin-bottom:6px}
  .dateLabel{font-size:20px;font-weight:700;color:#8B95A1;padding-left:4px}
  .card{background:#fff;border:1px solid #F2F4F6;border-radius:24px;box-shadow:0 4px 14px rgba(0,0,0,.04);
    padding:26px 28px;display:flex;flex-direction:column;gap:12px}
  .tag{align-self:flex-start;font-size:19px;font-weight:700;color:#1B64DA;background:#E8F3FF;padding:4px 14px;border-radius:999px}
  .note{font-size:27px;color:#191F28;line-height:1.5;margin:0}
</style></head>
<body>
  <div class="wrap">
    <div class="cap"><h2>적은 한 줄이<br>차곡차곡 쌓여요</h2><p>점수도 알림도 없이, 내 기록만.</p></div>
    <div class="screen">
      <div class="jtop">내가 적은 기록</div>
      <div class="dateLabel">오늘</div>
      <div class="card"><span class="tag">문장</span><p class="note">오늘은 좀 천천히 가보자</p></div>
      <div class="dateLabel">어제</div>
      <div class="card"><span class="tag">감사</span><p class="note">엄마가 끓여준 미역국 한 그릇</p></div>
      <div class="card"><span class="tag">다짐</span><p class="note">자기 전에 폰 대신 책 5분 읽기</p></div>
    </div>
  </div>
</body></html>
