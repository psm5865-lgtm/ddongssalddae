<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1932px;height:828px;overflow:hidden}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif}
  .hero{width:1932px;height:828px;background:linear-gradient(135deg,#3B8DFB 0%,#2563EB 100%);
    display:flex;align-items:center;justify-content:space-between;padding:0 150px;color:#fff;position:relative;overflow:hidden}
  .glow{position:absolute;border-radius:50%}
  .g1{width:560px;height:560px;right:-140px;top:-180px;background:rgba(255,255,255,.10)}
  .g2{width:420px;height:420px;left:38%;bottom:-220px;background:rgba(255,255,255,.07)}
  .left{max-width:1000px;z-index:2}
  .chip{display:inline-block;font-size:30px;font-weight:700;letter-spacing:.5px;
    background:rgba(255,255,255,.20);padding:14px 32px;border-radius:999px;margin-bottom:44px}
  h1{font-size:120px;font-weight:800;line-height:1.1;letter-spacing:-3px}
  .sub{font-size:42px;margin-top:38px;color:rgba(255,255,255,.92);font-weight:500;line-height:1.4}
  .pills{margin-top:56px;display:flex;gap:16px}
  .pill{font-size:27px;font-weight:600;background:rgba(255,255,255,.16);padding:16px 28px;border-radius:16px}
  .phone{width:440px;height:690px;background:#fff;border-radius:56px;box-shadow:0 44px 110px rgba(0,0,0,.28);
    padding:50px 38px;display:flex;flex-direction:column;color:#191F28;z-index:2}
  .pbrand{font-size:23px;font-weight:700;color:#3182F6}
  .ring{width:118px;height:118px;border-radius:50%;border:7px solid #E8F3FF;border-top-color:#3182F6;
    transform:rotate(20deg);margin:26px auto 0;display:flex;align-items:center;justify-content:center}
  .ring span{transform:rotate(-20deg);font-size:30px;font-weight:700}
  .quote{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    font-size:39px;font-weight:700;line-height:1.5;letter-spacing:-1px}
  .qm{font-size:70px;color:#C9E2FF;line-height:.3;margin-bottom:24px}
  .pbtn{height:80px;border-radius:20px;background:#3182F6;color:#fff;font-size:28px;font-weight:700;
    display:flex;align-items:center;justify-content:center}
</style></head>
<body>
  <div class="hero">
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="left">
      <span class="chip">똥쌀때</span>
      <h1>변기 위 5분,<br>마음챙김</h1>
      <div class="sub">숏츠 대신 — 단 하나의 활동에만 머물러요.</div>
      <div class="pills"><span class="pill">호흡</span><span class="pill">감사 한 줄</span><span class="pill">오늘의 문장</span><span class="pill">작은 목표</span></div>
    </div>
    <div class="phone">
      <div class="pbrand">오늘의 마음챙김</div>
      <div class="ring"><span>5:00</span></div>
      <div class="quote"><div class="qm">"</div>지금 이 순간,<br>내 호흡은<br>어디에 있나요?</div>
      <div class="pbtn">마음에 새겼어요</div>
    </div>
  </div>
</body></html>
