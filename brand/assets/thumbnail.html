<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1932px;height:828px;overflow:hidden}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif}
  .hero{width:1932px;height:828px;background:linear-gradient(135deg,#3B8DFB 0%,#2563EB 100%);
    display:flex;align-items:center;justify-content:space-between;padding:0 150px;color:#fff;position:relative;overflow:hidden}
  .glow{position:absolute;border-radius:50%}
  .g1{width:560px;height:560px;right:-140px;top:-180px;background:rgba(255,255,255,.10)}
  .g2{width:420px;height:420px;left:38%;bottom:-220px;background:rgba(255,255,255,.07)}
  .left{max-width:1040px;z-index:2}
  .chip{display:inline-block;font-size:30px;font-weight:700;letter-spacing:.5px;
    background:rgba(255,255,255,.20);padding:14px 32px;border-radius:999px;margin-bottom:40px}
  h1{font-size:118px;font-weight:800;line-height:1.1;letter-spacing:-3px}
  .sub{font-size:40px;margin-top:36px;color:rgba(255,255,255,.92);font-weight:500;line-height:1.4}
  .pills{margin-top:52px;display:flex;gap:14px;flex-wrap:wrap;max-width:1000px}
  .pill{font-size:26px;font-weight:600;background:rgba(255,255,255,.16);padding:15px 26px;border-radius:16px}
  .phone{width:440px;height:700px;background:#fff;border-radius:56px;box-shadow:0 44px 110px rgba(0,0,0,.28);
    padding:46px 36px;display:flex;flex-direction:column;color:#191F28;z-index:2}
  .pbar{display:flex;align-items:center}
  .peye{font-size:19px;font-weight:700;color:#3182F6}
  .pttl{font-size:27px;font-weight:800;letter-spacing:-1px;margin-top:2px}
  .ring{width:78px;height:78px;border-radius:50%;border:6px solid #E8F3FF;border-top-color:#3182F6;transform:rotate(40deg);
    display:flex;align-items:center;justify-content:center;margin-left:auto}
  .ring span{transform:rotate(-40deg);font-size:19px;font-weight:700}
  .dots{display:flex;justify-content:center;gap:6px;margin:22px 0 2px}
  .dot{width:7px;height:7px;border-radius:99px;background:#E5E8EB}
  .dot.act{width:20px;background:#3182F6}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .halo{width:248px;height:248px;border-radius:50%;background:radial-gradient(circle,#E8F3FF 0%,transparent 68%);display:flex;align-items:center;justify-content:center}
  .circle{width:174px;height:174px;border-radius:50%;background:linear-gradient(135deg,#5AA0FF,#2E73E6);
    box-shadow:0 18px 44px rgba(49,130,246,.45);display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;font-weight:700}
  .guide{font-size:25px;font-weight:700;margin-top:24px}
  .cyc{font-size:20px;color:#8B95A1;margin-top:10px}
  .pbtn{height:74px;border-radius:20px;background:#3182F6;color:#fff;font-size:26px;font-weight:700;
    display:flex;align-items:center;justify-content:center}
</style></head>
<body>
  <div class="hero">
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="left">
      <span class="chip">똥쌀때</span>
      <h1>변기 위 5분,<br>마음챙김</h1>
      <div class="sub">숏폼 대신 — 호흡·스트레칭·한 줄 기록까지 한 세트로.</div>
      <div class="pills"><span class="pill">깊은 호흡</span><span class="pill">스트레칭</span><span class="pill">오늘의 선택</span><span class="pill">기분 체크인</span><span class="pill">감사 한 줄</span></div>
    </div>
    <div class="phone">
      <div class="pbar"><div><div class="peye">오늘의 마음챙김</div><div class="pttl">깊게 숨 한 번</div></div><div class="ring"><span>0:42</span></div></div>
      <div class="dots"><i class="dot act"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i></div>
      <div class="center"><div class="halo"><div class="circle">들이쉬기</div></div><div class="guide">코로 천천히 들이마셔요</div><div class="cyc">1 / 6 사이클</div></div>
      <div class="pbtn">다음</div>
    </div>
  </div>
</body></html>
